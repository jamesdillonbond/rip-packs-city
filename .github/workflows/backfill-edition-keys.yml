name: Backfill Edition Integer Keys
on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Pass 1
        run: curl -s -f -X POST -H "x-ingest-token: ${{ secrets.INGEST_SECRET_TOKEN }}" -H "Content-Type: application/json" --max-time 60 https://rip-packs-city.vercel.app/api/backfill-editions
      - name: Wait
        run: sleep 35
      - name: Pass 2
        run: curl -s -f -X POST -H "x-ingest-token: ${{ secrets.INGEST_SECRET_TOKEN }}" -H "Content-Type: application/json" --max-time 60 https://rip-packs-city.vercel.app/api/backfill-editions
      - name: Wait 2
        run: sleep 35
      - name: Pass 3
        run: curl -s -f -X POST -H "x-ingest-token: ${{ secrets.INGEST_SECRET_TOKEN }}" -H "Content-Type: application/json" --max-time 60 https://rip-packs-city.vercel.app/api/backfill-editions
      - name: Wait 3
        run: sleep 35
      - name: Pass 4
        run: curl -s -f -X POST -H "x-ingest-token: ${{ secrets.INGEST_SECRET_TOKEN }}" -H "Content-Type: application/json" --max-time 60 https://rip-packs-city.vercel.app/api/backfill-editions
      - name: Wait 4
        run: sleep 35
      - name: Pass 5
        run: curl -s -f -X POST -H "x-ingest-token: ${{ secrets.INGEST_SECRET_TOKEN }}" -H "Content-Type: application/json" --max-time 60 https://rip-packs-city.vercel.app/api/backfill-editions

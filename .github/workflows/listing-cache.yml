name: Listing Cache

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  cache:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Refresh listing cache
        run: |
          RESPONSE=$(curl -s -X POST https://rip-packs-city.vercel.app/api/listing-cache \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            -H "Content-Type: application/json")
          echo "Response: $RESPONSE"

          CACHED=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('cached', 0))")
          echo "Cached: $CACHED listings"

name: NFL All Day Ingest Pipeline
on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:
jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - name: Ingest — Fetch latest NFL All Day sales
        run: |
          STATUS=$(curl -s -o /tmp/allday-ingest.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"batchSize": 50}' \
            https://rip-packs-city.vercel.app/api/allday-ingest)
          echo "All Day ingest status: $STATUS"
          cat /tmp/allday-ingest.json
          if [ "$STATUS" != "200" ]; then
            echo "::warning::All Day ingest returned $STATUS"
          fi

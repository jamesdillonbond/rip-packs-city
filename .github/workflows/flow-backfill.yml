name: Flow On-Chain Sales Indexer

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch:
    inputs:
      start_height:
        description: "Start block height (default: 137390146 = current spork root)"
        required: false
        default: ""
      end_height:
        description: "End block height (default: 0 = current sealed height)"
        required: false
        default: ""

jobs:
  index:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hours

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Flow on-chain sales indexer
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://bxcqstmqfzmuolpuynti.supabase.co
          SUPABASE_URL: https://bxcqstmqfzmuolpuynti.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          START_HEIGHT: ${{ github.event.inputs.start_height }}
          END_HEIGHT: ${{ github.event.inputs.end_height }}
        run: npx tsx scripts/flow-backfill.ts

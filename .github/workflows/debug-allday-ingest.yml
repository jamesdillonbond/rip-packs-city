name: Debug AllDay Ingest
on:
  push:
    paths:
      - '.github/workflows/debug-allday-ingest.yml'
  workflow_dispatch:
jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Call probe endpoint
        run: |
          curl -sS --max-time 60 \
            "https://rip-packs-city.vercel.app/api/allday-gql-probe?token=rippackscity2026" \
            -o debug-output.json || echo '{"error":"curl failed"}' > debug-output.json
          echo "--- RAW RESPONSE ---"
          cat debug-output.json
          echo "--- END ---"
      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add debug-output.json
          git commit -m "chore: allday-ingest debug output [skip ci]" || echo "nothing to commit"
          git push

name: RPC Data Pipeline

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Step 1 — Ingest recent sales
        run: |
          echo "=== INGEST ==="
          RESPONSE=$(curl -s -X POST https://rip-packs-city.vercel.app/api/ingest \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"batchSize": 50}')
          echo "Batch 1: $RESPONSE"
          CURSOR=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('nextCursor',''))" 2>/dev/null || echo "")
          if [ -n "$CURSOR" ]; then
            RESPONSE2=$(curl -s -X POST https://rip-packs-city.vercel.app/api/ingest \
              -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"batchSize\": 50, \"cursor\": \"$CURSOR\"}")
            echo "Batch 2: $RESPONSE2"
          fi

      - name: Step 2 — FMV recalc
        run: |
          echo "=== FMV RECALC ==="
          OFFSET=0
          BATCH=0
          TOTAL=0
          while true; do
            BATCH=$((BATCH + 1))
            RESPONSE=$(curl -s -X POST https://rip-packs-city.vercel.app/api/fmv-recalc \
              -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"limit\": 500, \"offset\": $OFFSET}")
            echo "Recalc batch $BATCH: $RESPONSE"
            HAS_MORE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('hasMore', False))" 2>/dev/null || echo "False")
            SNAPSHOTS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('snapshotsUpdated', 0))" 2>/dev/null || echo "0")
            TOTAL=$((TOTAL + SNAPSHOTS))
            NEXT_OFFSET=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('nextOffset', 0) or 0)" 2>/dev/null || echo "0")
            OFFSET=$NEXT_OFFSET
            if [ "$HAS_MORE" != "True" ]; then
              break
            fi
            sleep 1
          done
          echo "Recalc total: $TOTAL snapshots"

      - name: Step 3 — Listing cache
        run: |
          echo "=== LISTING CACHE ==="
          RESPONSE=$(curl -s -X POST https://rip-packs-city.vercel.app/api/listing-cache \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            -H "Content-Type: application/json")
          echo "Cache: $RESPONSE"

      - name: Step 4 — Historical backfill
        run: |
          echo "=== BACKFILL ==="
          RESPONSE=$(curl -s -X POST https://rip-packs-city.vercel.app/api/backfill \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            -H "Content-Type: application/json")
          echo "Backfill: $RESPONSE"
          MESSAGE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('message', ''))" 2>/dev/null || echo "")
          if [ "$MESSAGE" = "Backfill already complete" ]; then
            echo "Backfill finished — this step can be removed"
          fi

      - name: Pipeline complete
        run: echo "Pipeline completed at $(date -u)"

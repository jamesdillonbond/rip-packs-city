name: RPC Data Pipeline
on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:
jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - name: Ingest — Fetch latest Top Shot sales
        run: |
          STATUS=$(curl -s -o /tmp/ingest.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            https://rip-packs-city.vercel.app/api/ingest)
          echo "Ingest status: $STATUS"
          cat /tmp/ingest.json
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Ingest returned $STATUS"
          fi
      - name: FMV Recalc — Recompute fair market values
        run: |
          STATUS=$(curl -s -o /tmp/recalc.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            https://rip-packs-city.vercel.app/api/fmv-recalc)
          echo "FMV recalc status: $STATUS"
          cat /tmp/recalc.json
          if [ "$STATUS" != "200" ]; then
            echo "::warning::FMV recalc returned $STATUS"
          fi
      - name: FMV Backfill — Cover editions with sales but no FMV snapshot
        run: |
          STATUS=$(curl -s -o /tmp/fmv-backfill.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"batchSize":100}' \
            https://rip-packs-city.vercel.app/api/fmv-backfill)
          echo "FMV backfill status: $STATUS"
          cat /tmp/fmv-backfill.json
          if [ "$STATUS" != "200" ]; then
            echo "::warning::FMV backfill returned $STATUS"
          fi
      - name: Flowty Enrich — Backfill FMV/asks for Trevor's wallet
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /tmp/flowty-enrich.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"wallet":"0xbd94cade097e50ac"}' \
            https://rip-packs-city.vercel.app/api/wallet-enrich-flowty)
          echo "Flowty enrich status: $STATUS"
          cat /tmp/flowty-enrich.json
      - name: Backfill Player Names — Fill missing player names via Supabase Edge Function
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /tmp/player-names.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            https://rip-packs-city.vercel.app/api/backfill-player-names)
          echo "Player names backfill status: $STATUS"
          cat /tmp/player-names.json
      - name: Listing Cache — Refresh Flowty listings
        run: |
          STATUS=$(curl -s -o /tmp/cache.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            https://rip-packs-city.vercel.app/api/listing-cache)
          echo "Listing cache status: $STATUS"
          cat /tmp/cache.json
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Listing cache returned $STATUS"
          fi
      - name: Backfill — Ingest historical sales
        run: |
          STATUS=$(curl -s -o /tmp/backfill.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            https://rip-packs-city.vercel.app/api/backfill)
          echo "Backfill status: $STATUS"
          cat /tmp/backfill.json
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Backfill returned $STATUS"
          fi
      - name: Flowty Listings — Sync real-time listings to cache
        run: |
          STATUS=$(curl -s -o /tmp/flowty-listings.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            "https://rip-packs-city.vercel.app/api/flowty-listings?limit=200")
          echo "Flowty listings status: $STATUS"
          cat /tmp/flowty-listings.json
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Flowty listings returned $STATUS"
          fi
      - name: Flowty Sales — Ingest cross-marketplace sales via Firestore
        run: |
          STATUS=$(curl -s -o /tmp/flowty-sales.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            "https://rip-packs-city.vercel.app/api/flowty-sales?limit=200")
          echo "Flowty sales status: $STATUS"
          cat /tmp/flowty-sales.json
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Flowty sales returned $STATUS"
          fi
      - name: Price snapshots
        run: |
          RESPONSE=$(curl -s -X POST https://rip-packs-city.vercel.app/api/cron/price-snapshots \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            -H "Content-Type: application/json")
          echo "Price snapshots: $RESPONSE"
      # DISABLED: Twitter API keys not yet configured.
      # To activate: remove the `if: false` from the steps and
      # ensure TWITTER_API_KEY, TWITTER_API_SECRET,
      # TWITTER_ACCESS_TOKEN, TWITTER_ACCESS_SECRET are set
      # in Vercel environment variables.
      - name: Social Bot — Post deals to Twitter
        if: false
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /tmp/social.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            https://rip-packs-city.vercel.app/api/social-bot)
          echo "Social bot status: $STATUS"
          cat /tmp/social.json
      - name: Sales Alert Bot
        if: false
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /tmp/sales-alert.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            https://rip-packs-city.vercel.app/api/bots/sales-alert)
          echo "Sales alert status: $STATUS"
          cat /tmp/sales-alert.json
      - name: Milestone Bot
        if: false
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /tmp/milestone.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            https://rip-packs-city.vercel.app/api/bots/milestone)
          echo "Milestone bot status: $STATUS"
          cat /tmp/milestone.json
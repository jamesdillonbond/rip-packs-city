name: RPC Data Pipeline
on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:
jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - name: Ingest — Fetch latest Top Shot sales
        run: |
          STATUS=$(curl -s -o /tmp/ingest.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            https://rip-packs-city.vercel.app/api/ingest)
          echo "Ingest status: $STATUS"
          cat /tmp/ingest.json
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Ingest returned $STATUS"
          fi
      - name: FMV Recalc — Recompute fair market values
        run: |
          STATUS=$(curl -s -o /tmp/recalc.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            https://rip-packs-city.vercel.app/api/fmv-recalc)
          echo "FMV recalc status: $STATUS"
          cat /tmp/recalc.json
          if [ "$STATUS" != "200" ]; then
            echo "::warning::FMV recalc returned $STATUS"
          fi
      - name: Listing Cache — Refresh Flowty listings
        run: |
          STATUS=$(curl -s -o /tmp/cache.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            https://rip-packs-city.vercel.app/api/listing-cache)
          echo "Listing cache status: $STATUS"
          cat /tmp/cache.json
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Listing cache returned $STATUS"
          fi
      - name: Backfill — Ingest historical sales
        run: |
          STATUS=$(curl -s -o /tmp/backfill.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            https://rip-packs-city.vercel.app/api/backfill)
          echo "Backfill status: $STATUS"
          cat /tmp/backfill.json
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Backfill returned $STATUS"
          fi
      - name: Flowty Sales — Ingest cross-marketplace sales via Firestore
        run: |
          STATUS=$(curl -s -o /tmp/flowty-sales.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            "https://rip-packs-city.vercel.app/api/flowty-sales?limit=200")
          echo "Flowty sales status: $STATUS"
          cat /tmp/flowty-sales.json
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Flowty sales returned $STATUS"
          fi
      - name: Social Bot — Post deals to Twitter
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /tmp/social.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            https://rip-packs-city.vercel.app/api/social-bot)
          echo "Social bot status: $STATUS"
          cat /tmp/social.json
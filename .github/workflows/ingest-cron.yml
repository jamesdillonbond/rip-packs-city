name: FMV Ingest

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run ingest batch 1
        run: |
          RESPONSE=$(curl -s -X POST https://rip-packs-city.vercel.app/api/ingest \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"batchSize": 50}')
          echo "Batch 1: $RESPONSE"
      - name: Run ingest batch 2
        run: |
          BATCH1=$(curl -s -X POST https://rip-packs-city.vercel.app/api/ingest \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"batchSize": 50}')
          CURSOR=$(echo "$BATCH1" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('nextCursor',''))")
          if [ -n "$CURSOR" ]; then
            RESPONSE=$(curl -s -X POST https://rip-packs-city.vercel.app/api/ingest \
              -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"batchSize\": 50, \"cursor\": \"$CURSOR\"}")
            echo "Batch 2: $RESPONSE"
          else
            echo "No cursor, skipping batch 2"
          fi
      - name: Log completion
        run: echo "Ingest cron completed at $(date -u)"

  recalc:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run recalc once per day at 6am UTC, not every 20 minutes
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && startsWith(github.run_id, '1') == false)
    steps:
      - name: Run FMV recalc (paginated)
        run: |
          OFFSET=0
          BATCH=0
          TOTAL=0
          while true; do
            BATCH=$((BATCH + 1))
            RESPONSE=$(curl -s -X POST https://rip-packs-city.vercel.app/api/fmv-recalc \
              -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"limit\": 500, \"offset\": $OFFSET}")
            echo "Recalc batch $BATCH: $RESPONSE"
            HAS_MORE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('hasMore', False))")
            SNAPSHOTS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('snapshotsUpdated', 0))")
            TOTAL=$((TOTAL + SNAPSHOTS))
            NEXT_OFFSET=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('nextOffset', 0) or 0)")
            OFFSET=$NEXT_OFFSET
            if [ "$HAS_MORE" != "True" ]; then
              break
            fi
            sleep 1
          done
          echo "Recalc complete — total snapshots updated: $TOTAL"

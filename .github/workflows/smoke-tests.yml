name: Smoke Tests

on:
  deployment_status:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    if: github.event_name != 'deployment_status' || github.event.deployment_status.state == 'success'
    timeout-minutes: 5
    steps:
      - name: Wait for deployment to stabilize
        if: github.event_name == 'deployment_status'
        run: sleep 15

      - name: Run smoke tests
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://rip-packs-city.vercel.app/api/smoke-test \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

          PASSED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('passed',0))")
          FAILED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('failed',0))")
          TOTAL=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total',0))")

          echo "Results: $PASSED passed, $FAILED failed out of $TOTAL tests"

          if [ "$FAILED" != "0" ]; then
            echo "::error::$FAILED smoke tests failed"

            # Show failed tests
            echo "$BODY" | python3 -c "
import sys,json
d=json.load(sys.stdin)
for r in d.get('results',[]):
  if not r['passed']:
    print(f\"  FAIL: {r['name']} — {r['detail']}\")
"
            exit 1
          fi

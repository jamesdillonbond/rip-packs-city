name: CryptoSlam Historical Backfill

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hours

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CryptoSlam scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://bxcqstmqfzmuolpuynti.supabase.co
          SUPABASE_URL: https://bxcqstmqfzmuolpuynti.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRYPTOSLAM_API_KEY: ${{ secrets.CRYPTOSLAM_API_KEY }}
        run: npx tsx scripts/cryptoslam-scrape.ts

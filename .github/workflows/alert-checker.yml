name: FMV Alert Checker
on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:
jobs:
  check-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    continue-on-error: true
    steps:
      - name: Check FMV alerts
        run: |
          STATUS=$(curl -s -o /tmp/check-alerts.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET_TOKEN }}" \
            https://rip-packs-city.vercel.app/api/cron/check-alerts)
          BODY=$(cat /tmp/check-alerts.json)
          echo "Check alerts status: $STATUS"
          echo "$BODY"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Check alerts returned $STATUS"
            exit 1
          fi
          TRIGGERED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('triggered',0))")
          if [ "$TRIGGERED" -gt 0 ]; then
            echo "::notice::Triggered $TRIGGERED alert(s)"
          fi

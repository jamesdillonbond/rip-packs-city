name: TS Listing Ingest

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and upsert Top Shot listings
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TS_PROXY_URL: ${{ secrets.TS_PROXY_URL }}
          TS_PROXY_SECRET: ${{ secrets.TS_PROXY_SECRET }}
        run: node scripts/ts-ingest.js
